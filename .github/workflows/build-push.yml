name: Build and Push Docker Images

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      config-server: ${{ steps.filter.outputs.config-server }}
      discovery-server: ${{ steps.filter.outputs.discovery-server }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      customers-service: ${{ steps.filter.outputs.customers-service }}
      visits-service: ${{ steps.filter.outputs.visits-service }}
      vets-service: ${{ steps.filter.outputs.vets-service }}
      genai-service: ${{ steps.filter.outputs.genai-service }}
      admin-server: ${{ steps.filter.outputs.admin-server }}
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            config-server:
              - 'spring-petclinic-config-server/**'
            discovery-server:
              - 'spring-petclinic-discovery-server/**'
            api-gateway:
              - 'spring-petclinic-api-gateway/**'
            customers-service:
              - 'spring-petclinic-customers-service/**'
            visits-service:
              - 'spring-petclinic-visits-service/**'
            vets-service:
              - 'spring-petclinic-vets-service/**'
            genai-service:
              - 'spring-petclinic-genai-service/**'
            admin-server:
              - 'spring-petclinic-admin-server/**'

      - name: Build changed services list
        id: changed
        run: |
          SERVICES=()
          for svc in config-server discovery-server api-gateway \
            customers-service visits-service vets-service \
            genai-service admin-server; do
            if [ "${{ steps.filter.outputs[svc] }}" == "true" ]; then
              SERVICES+=("$svc")
            fi
          done
          echo "services=$(echo ${SERVICES[@]} | jq -Rc 'split(" ")')" >> $GITHUB_OUTPUT

  build-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - customers-service
          - visits-service
          - vets-service
          - genai-service
          - admin-server
        exclude:
          - service: ${{ needs.detect-changes.outputs['config-server'] != 'true' && 'config-server' || '' }}
          - service: ${{ needs.detect-changes.outputs['discovery-server'] != 'true' && 'discovery-server' || '' }}
          - service: ${{ needs.detect-changes.outputs['api-gateway'] != 'true' && 'api-gateway' || '' }}
          - service: ${{ needs.detect-changes.outputs['customers-service'] != 'true' && 'customers-service' || '' }}
          - service: ${{ needs.detect-changes.outputs['visits-service'] != 'true' && 'visits-service' || '' }}
          - service: ${{ needs.detect-changes.outputs['vets-service'] != 'true' && 'vets-service' || '' }}
          - service: ${{ needs.detect-changes.outputs['genai-service'] != 'true' && 'genai-service' || '' }}
          - service: ${{ needs.detect-changes.outputs['admin-server'] != 'true' && 'admin-server' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::506261418156:role/petclinic-dev-github-actions
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set service directory
        id: dir
        run: echo "path=spring-petclinic-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Build Maven JAR
        run: |
          cd ${{ steps.dir.outputs.path }}
          ../mvnw package -DskipTests

      - name: Find JAR file
        id: jar
        run: |
          JAR=$(find ${{ steps.dir.outputs.path }}/target -name "*.jar" ! -name "*sources*" | head -1)
          echo "file=$JAR" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.dir.outputs.path }}
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/petclinic-dev/${{ matrix.service }}:${{ steps.tag.outputs.sha }}
          build-args: JAR_FILE=${{ steps.jar.outputs.file }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/petclinic-dev/${{ matrix.service }}:${{ steps.tag.outputs.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/petclinic-dev/${{ matrix.service }}:${{ steps.tag.outputs.sha }}

  notify-platform:
    needs: [detect-changes, build-push]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger platform repo image tag update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          repository: ukpabi-Joy/-petclinic-platform
          event-type: app-image-built
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "services": ${{ needs.detect-changes.outputs.services }}
            }
