name: Build and Push Docker Images

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      config-server: ${{ steps.filter.outputs.config-server }}
      discovery-server: ${{ steps.filter.outputs.discovery-server }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      customers-service: ${{ steps.filter.outputs.customers-service }}
      visits-service: ${{ steps.filter.outputs.visits-service }}
      vets-service: ${{ steps.filter.outputs.vets-service }}
      genai-service: ${{ steps.filter.outputs.genai-service }}
      admin-server: ${{ steps.filter.outputs.admin-server }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            config-server:
              - 'spring-petclinic-config-server/**'
            discovery-server:
              - 'spring-petclinic-discovery-server/**'
            api-gateway:
              - 'spring-petclinic-api-gateway/**'
            customers-service:
              - 'spring-petclinic-customers-service/**'
            visits-service:
              - 'spring-petclinic-visits-service/**'
            vets-service:
              - 'spring-petclinic-vets-service/**'
            genai-service:
              - 'spring-petclinic-genai-service/**'
            admin-server:
              - 'spring-petclinic-admin-server/**'

  build-config-server:
    needs: detect-changes
    if: needs.detect-changes.outputs['config-server'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: config-server
      port: "8888"
    secrets: inherit

  build-discovery-server:
    needs: detect-changes
    if: needs.detect-changes.outputs['discovery-server'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: discovery-server
      port: "8761"
    secrets: inherit

  build-api-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs['api-gateway'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: api-gateway
      port: "8080"
    secrets: inherit

  build-customers-service:
    needs: detect-changes
    if: needs.detect-changes.outputs['customers-service'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: customers-service
      port: "8081"
    secrets: inherit

  build-visits-service:
    needs: detect-changes
    if: needs.detect-changes.outputs['visits-service'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: visits-service
      port: "8082"
    secrets: inherit

  build-vets-service:
    needs: detect-changes
    if: needs.detect-changes.outputs['vets-service'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: vets-service
      port: "8083"
    secrets: inherit

  build-genai-service:
    needs: detect-changes
    if: needs.detect-changes.outputs['genai-service'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: genai-service
      port: "8084"
    secrets: inherit

  build-admin-server:
    needs: detect-changes
    if: needs.detect-changes.outputs['admin-server'] == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      service: admin-server
      port: "9090"
    secrets: inherit

  notify-platform:
    needs:
      - detect-changes
      - build-config-server
      - build-discovery-server
      - build-api-gateway
      - build-customers-service
      - build-visits-service
      - build-vets-service
      - build-genai-service
      - build-admin-server
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Build services list and notify
        env:
          CS: ${{ needs.detect-changes.outputs['config-server'] }}
          DS: ${{ needs.detect-changes.outputs['discovery-server'] }}
          AG: ${{ needs.detect-changes.outputs['api-gateway'] }}
          CU: ${{ needs.detect-changes.outputs['customers-service'] }}
          VI: ${{ needs.detect-changes.outputs['visits-service'] }}
          VE: ${{ needs.detect-changes.outputs['vets-service'] }}
          GE: ${{ needs.detect-changes.outputs['genai-service'] }}
          AS: ${{ needs.detect-changes.outputs['admin-server'] }}
          SHA: ${{ github.sha }}
          TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN }}
        run: |
          SERVICES=""
          [ "$CS" == "true" ] && SERVICES="${SERVICES},\"config-server\""
          [ "$DS" == "true" ] && SERVICES="${SERVICES},\"discovery-server\""
          [ "$AG" == "true" ] && SERVICES="${SERVICES},\"api-gateway\""
          [ "$CU" == "true" ] && SERVICES="${SERVICES},\"customers-service\""
          [ "$VI" == "true" ] && SERVICES="${SERVICES},\"visits-service\""
          [ "$VE" == "true" ] && SERVICES="${SERVICES},\"vets-service\""
          [ "$GE" == "true" ] && SERVICES="${SERVICES},\"genai-service\""
          [ "$AS" == "true" ] && SERVICES="${SERVICES},\"admin-server\""
          
          # Remove leading comma
          SERVICES="[${SERVICES#,}]"
          echo "Services: $SERVICES"
          
          if [ "$SERVICES" != "[]" ]; then
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/ukpabi-Joy/-petclinic-platform/dispatches \
              -d "{\"event_type\":\"app-image-built\",\"client_payload\":{\"sha\":\"${SHA}\",\"services\":${SERVICES}}}"
            echo "Dispatched to platform repo"
          fi
